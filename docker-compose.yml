version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: noticia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: noticia_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-noticia_pass_dev}
      POSTGRES_DB: noticia_da_hora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noticia_user -d noticia_da_hora"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: noticia_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
